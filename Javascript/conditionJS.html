<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">                           
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction of conditions statements</title>
</head>
<body>
    <script>
        //conditions : used to perform different actions based on different conditions 
        //if statement : used to specify a block of code to be executed if a condition is true 
        let age = 18;
        if(age >= 18)
        {
            console.log("You are eligible to vote");
        }
        age=15;
        if(age>=18)
        {
            console.log("You are eligible to vote");
        }
        else
        {
            console.log("You are not eligible to vote");
        }
        //if else statement : used to specify a block of code to be executed if a condition is true and another block of code to be executed if the condition is false 
        let marks = 75;
        if(marks >= 60)
        {
            console.log("You have passed the exam");
        }
        else
        {
            console.log("You have failed the exam");
        }

        //else if statement : used to specify a new condition to test, if the first condition is false 
        let score = 85;
        if(score >= 90)
        {
            console.log("You got an A grade");
        }
        else if(score >= 80)
        {
            console.log("You got a B grade");
        }
        else if(score >= 70)
        {
            console.log("You got a C grade");
        }
        else
        {
            console.log("You got a D grade");
        }
        
        //switch case 
        let grade ='D';
        let result;
        switch(grade)
        {
            case 'A':result =("i got an A grade");
            break;
            case 'B':result =("i got a B grade");
            break;
            default:result =("FAil");
        }
        console.log(result);

        if(grade =="A")
        {
            console.log("i got an ");
        }
        else if(grade =="B")
        {
            console.log("i got a B grade");
        }
        else
        {
            console.log("FAil");
        }
    </script>
</body>
</html>
